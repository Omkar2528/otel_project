services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    container_name: otel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    ports:
      - "3307:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel:
    build:
      context: ./otel-collector
      dockerfile: Dockerfile
    container_name: otel-collector
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "13133:13133" # health check
    environment:
      # In local docker-compose, CloudWatch exporters require AWS credentials.
      # Set these in your shell or a .env file (never commit real keys).
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  php-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otel-php-app
    ports:
      - "8080:80"
    environment:
      # collector is reachable by service name in docker-compose
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel:4318
      OTEL_SERVICE_NAME: otel-php-app
      OTEL_PHP_AUTOLOAD_ENABLED: "true"
      APP_ENV: development
      DB_HOST: mysql
      DB_USER: root
      DB_PASS: root
      DB_NAME: test
    depends_on:
      mysql:
        condition: service_healthy
      otel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health.php"]
      interval: 10s
      timeout: 5s
      retries: 3

  load-generator:
    image: php:8.2-cli
    container_name: otel-load-generator
    volumes:
      - ./load-generator.php:/app/load-generator.php:ro
    working_dir: /app
    environment:
      TARGET_URL: http://php-app/index.php
    command: ["php", "/app/load-generator.php"]
    depends_on:
      php-app:
        condition: service_healthy

volumes:
  mysql_data:
